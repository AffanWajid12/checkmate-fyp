version: '3.8'

services:
  test_db:
    image: postgres:15
    container_name: checkmate_test_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: test_db
    ports:
      - "5433:5432" # Map to 5433 to avoid conflict with default Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
